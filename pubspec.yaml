name: dry_slots
description: "Dry Slots is a decision-first weather app for UK users."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  flutter_riverpod: ^2.6.1
  freezed_annotation: ^3.1.0
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  go_router: ^16.3.0
  hive_flutter: ^1.1.0
  json_annotation: ^4.11.0
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.3
  xml: ^6.6.1

dev_dependencies:
  build_runner: ^2.5.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.3
  json_serializable: ^6.11.1

flutter:
  uses-material-design: true
